name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run test suite
        run: cargo test

      - name: Run Python test suite
        run: python3 -m unittest discover -s tests -p 'test_*.py'

  desktop-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Qt and desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            qtbase5-dev \
            qtdeclarative5-dev \
            qtquickcontrols2-5-dev

      - name: Configure desktop build
        run: cmake -S apps/desktop-qt -B build/desktop-qt -G Ninja

      - name: Build desktop
        run: cmake --build build/desktop-qt
