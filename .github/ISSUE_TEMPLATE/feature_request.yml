name: Feature request
description: Suggest a new capability or workflow improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What workflow is blocked or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gating
        - Rendering
        - FCS ingestion
        - Workspace and reproducibility
        - Backend and parity
        - Documentation
  - type: textarea
    id: context
    attributes:
      label: Additional context
